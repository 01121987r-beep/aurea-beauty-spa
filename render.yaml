services:
  - type: web
    name: aurea-beauty-spa
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DB_PATH
        value: /var/data/beauty-spa.sqlite
    disk:
      name: aurea-beauty-data
      mountPath: /var/data
      sizeGB: 1
